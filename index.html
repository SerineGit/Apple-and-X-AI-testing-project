<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Apple & X AI Testing Project</title>
<style>
  /* Reset & base */
  * {
    box-sizing: border-box;
  }
  body {
    margin: 0; padding: 0;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: #121212;
    color: #eee;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
  }
  .container {
    margin: 40px 20px;
    max-width: 480px;
    width: 100%;
    background: #1f1f1f;
    border-radius: 12px;
    box-shadow: 0 0 30px #0a84ff88;
    padding: 30px 20px;
  }
  h1 {
    text-align: center;
    margin-bottom: 24px;
    color: #0a84ff;
    user-select: none;
  }
  nav.menu {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  nav.menu a.menu-item {
    display: block;
    padding: 14px 18px;
    background: linear-gradient(135deg, #0a84ff, #3b82f6);
    color: white;
    text-decoration: none;
    font-size: 1.15rem;
    font-weight: 600;
    border-radius: 8px;
    box-shadow:
      0 0 8px #3b82f6cc,
      inset 0 -3px 6px #0656b1cc;
    transition: background 0.3s ease, box-shadow 0.3s ease;
    user-select: none;
  }
  nav.menu a.menu-item:hover,
  nav.menu a.menu-item:focus {
    background: linear-gradient(135deg, #3b82f6, #0a84ff);
    box-shadow:
      0 0 14px #0a84ffdd,
      inset 0 -3px 8px #0656b1dd;
    outline: none;
  }
  nav.menu a.menu-item:active {
    background: #064a8e;
    box-shadow: none;
  }
  footer {
    margin-top: 28px;
    font-size: 0.85rem;
    text-align: center;
    color: #666;
    user-select: none;
  }
  @media (max-width: 520px) {
    .container {
      margin: 20px 10px;
    }
    nav.menu a.menu-item {
      font-size: 1rem;
      padding: 12px 16px;
    }
  }
</style>
</head>
<body>
  <div class="container" role="main">
    <h1>Apple & X AI Testing Project</h1>
    <nav class="menu" role="navigation" aria-label="Project folders menu">
      <a href="https://github.com/SerineGit/Apple-and-X-AI-testing-project/tree/main/01_Documentation" 
         target="_blank" rel="noopener noreferrer" class="menu-item">📘 Documentation</a>
      <a href="https://github.com/SerineGit/Apple-and-X-AI-testing-project/tree/main/02_Front_end_Testing" 
         target="_blank" rel="noopener noreferrer" class="menu-item">🖥️ Frontend Testing</a>
      <a href="https://github.com/SerineGit/Apple-and-X-AI-testing-project/tree/main/03_Performance_testing" 
         target="_blank" rel="noopener noreferrer" class="menu-item">⚡ Performance Testing</a>
      <a href="https://github.com/SerineGit/Apple-and-X-AI-testing-project/tree/main/04_Security_testing" 
         target="_blank" rel="noopener noreferrer" class="menu-item">🔐 Security Testing</a>
      <a href="https://github.com/SerineGit/Apple-and-X-AI-testing-project/tree/main/05_API_Testing" 
         target="_blank" rel="noopener noreferrer" class="menu-item">🔌 API Testing</a>
      <a href="https://github.com/SerineGit/Apple-and-X-AI-testing-project/tree/main/06_Bug_Reports" 
         target="_blank" rel="noopener noreferrer" class="menu-item">🐞 Bug Reports</a>
    </nav>
    <footer>
      &copy; 2025 Serine Zargaryan — QA & Testing Project
    </footer>
  </div>
</body>
</html>
