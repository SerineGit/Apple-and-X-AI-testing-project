<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Apple & X AI Testing Project</title>
<style>
  body {
    margin: 0; padding: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen,
      Ubuntu, Cantarell, "Open Sans", "Helvetica Neue", sans-serif;
    background: #121212;
    color: #f0f0f5;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
  }
  .container {
    margin: 40px 20px;
    max-width: 500px;
    width: 100%;
    background: #1c1c1e;
    border-radius: 24px;
    box-shadow:
      0 10px 30px rgba(10, 132, 255, 0.4),
      inset 0 0 20px rgba(255, 255, 255, 0.05);
    padding: 40px 30px;
    user-select: none;
  }
  h1 {
    text-align: center;
    margin-bottom: 36px;
    font-weight: 700;
    font-size: 2rem;
    color: #0a84ff;
  }
  nav.menu {
    display: flex;
    flex-wrap: wrap;
    gap: 18px;
    justify-content: center;
  }
  nav.menu a.menu-item {
    background: linear-gradient(135deg, #0a84ff 0%, #3b82f6 100%);
    color: white;
    padding: 14px 26px;
    font-size: 1.1rem;
    font-weight: 600;
    text-decoration: none;
    border-radius: 9999px; /* pill shape */
    box-shadow:
      0 6px 10px rgba(10, 132, 255, 0.4),
      0 2px 4px rgba(10, 132, 255, 0.3);
    transition:
      transform 0.3s cubic-bezier(0.4, 0, 0.2, 1),
      box-shadow 0.3s cubic-bezier(0.4, 0, 0.2, 1),
      background 0.3s ease;
    user-select: none;
    display: inline-flex;
    align-items: center;
    gap: 10px;
  }
  nav.menu a.menu-item:hover,
  nav.menu a.menu-item:focus {
    background: linear-gradient(135deg, #3b82f6 0%, #0a84ff 100%);
    box-shadow:
      0 12px 24px rgba(10, 132, 255, 0.7),
      0 4px 8px rgba(10, 132, 255, 0.5);
    transform: translateY(-3px);
    outline: none;
  }
  nav.menu a.menu-item:active {
    transform: translateY(0);
    box-shadow:
      0 4px 8px rgba(10, 132, 255, 0.4);
    background: #0656b1;
  }
  footer {
    margin-top: 40px;
    font-size: 0.85rem;
    text-align: center;
    color: #666;
  }
  @media (max-width: 520px) {
    nav.menu a.menu-item {
      padding: 12px 20px;
      font-size: 1rem;
    }
    .container {
      padding: 30px 20px;
      margin: 20px 10px;
    }
  }
</style>
</head>
<body>
  <div class="container" role="main">
    <h1>Apple & X AI Testing Project</h1>
    <nav class="menu" role="navigation" aria-label="Project folders menu">
      <a href="https://github.com/SerineGit/Apple-and-X-AI-testing-project/tree/main/01_Documentation" target="_blank" rel="noopener noreferrer" class="menu-item">📘 Documentation</a>
      <a href="https://github.com/SerineGit/Apple-and-X-AI-testing-project/tree/main/02_Front_end_Testing" target="_blank" rel="noopener noreferrer" class="menu-item">🖥️ Frontend Testing</a>
      <a href="https://github.com/SerineGit/Apple-and-X-AI-testing-project/tree/main/03_Performance_testing" target="_blank" rel="noopener noreferrer" class="menu-item">⚡ Performance Testing</a>
      <a href="https://github.com/SerineGit/Apple-and-X-AI-testing-project/tree/main/04_Security_testing" target="_blank" rel="noopener noreferrer" class="menu-item">🔐 Security Testing</a>
      <a href="https://github.com/SerineGit/Apple-and-X-AI-testing-project/tree/main/05_API_Testing" target="_blank" rel="noopener noreferrer" class="menu-item">🔌 API Testing</a>
      <a href="https://github.com/SerineGit/Apple-and-X-AI-testing-project/tree/main/06_Bug_Reports" target="_blank" rel="noopener noreferrer" class="menu-item">🐞 Bug Reports</a>
    </nav>
    <footer>
      &copy; 2025 Serine Zargaryan — QA & Testing Project
    </footer>
  </div>
</body>
</html>
